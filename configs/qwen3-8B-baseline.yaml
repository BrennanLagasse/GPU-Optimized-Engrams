# Adaptation of Engrams architecture discussed to *B scale model


device_map: "cuda:0"
offload_lookup: False

vocab_size: 129_280 # From DeepSeek-R1 tokenizer
context_length: 32_768
emb_dim: 4096
hidden_dim: 22_016
n_heads: 32
n_layers: 32
drop_rate: 0.0
qkv_bias: False
num_experts: 0
num_experts_per_tok: 2

hc_mult: 4
layer_ids: [1, 14]

# Scale to ~1.6B params, same ratio as for Engrams-27B w/ 5B lookup
engrams_cfg:
  tokenizer_name_or_path: "deepseek-ai/DeepSeek-R1-Distill-Qwen-1.5B"
  engram_vocab_size: [689_488, 689_488]
  max_ngram_size: 3
  n_embed_per_ngram: 1280
  n_head_per_ngram: 8
  pad_id: 2
  seed: 0
  kernel_size: 2
  use_short_conv: True
  cached_inference_short_conv_mode: "step_kernel"
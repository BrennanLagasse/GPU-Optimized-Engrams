# Parameters drawn from Engrams-27B and Qwen3-27B 

device_map: "cuda:0"
offload_lookup: False

# Qwen3-27B
vocab_size: 129_280 # From DeepSeek-R1 tokenizer
context_length: 262_144
emb_dim: 5120
hidden_dim: 17_408
n_heads: 16
n_layers: 64
drop_rate: 0.0
qkv_bias: False

# Other
num_experts: 0
num_experts_per_tok: 2

# Engram-27B
hc_mult: 4
layer_ids: [1, 14]

engrams_cfg:
  tokenizer_name_or_path: "deepseek-ai/DeepSeek-R1-Distill-Qwen-1.5B"
  engram_vocab_size: [1_034_240, 1_034_240]
  max_ngram_size: 3
  n_embed_per_ngram: 1280
  n_head_per_ngram: 8
  pad_id: 2
  seed: 0
  kernel_size: 2
  use_short_conv: True
  cached_inference_short_conv_mode: "step_kernel"
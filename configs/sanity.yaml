# Small model for quick testing

device_map: "cuda:0"
offload_lookup: True

vocab_size: 10_000
context_length: 1024
emb_dim: 512
hidden_dim: 1024
n_heads: 16
n_layers: 16
drop_rate: 0.0
qkv_bias: False
num_experts: 0
num_experts_per_tok: 2

hc_mult: 4
layer_ids: [1, 3]

engrams_cfg:
  tokenizer_name_or_path: "deepseek-ai/DeepSeek-R1-Distill-Qwen-1.5B"
  engram_vocab_size: [250, 250]
  max_ngram_size: 3
  n_embed_per_ngram: 1280
  n_head_per_ngram: 8
  pad_id: 2
  seed: 0
  kernel_size: 2
  use_short_conv: True
  cached_inference_short_conv_mode: "step_kernel"